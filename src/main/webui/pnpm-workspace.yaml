overrides:
  'vue': 'beta'
  '@vue/compiler-core': 'beta'
  '@vue/compiler-dom': 'beta'
  '@vue/compiler-sfc': 'beta'
  '@vue/compiler-ssr': 'beta'
  '@vue/compiler-vapor': 'beta'
  '@vue/reactivity': 'beta'
  '@vue/runtime-core': 'beta'
  '@vue/runtime-dom': 'beta'
  '@vue/runtime-vapor': 'beta'
  '@vue/server-renderer': 'beta'
  '@vue/shared': 'beta'
  '@vue/compat': 'beta'
  'oxlint': 'latest'
  'oxfmt': 'latest'
  'eslint-plugin-oxlint': 'latest'

peerDependencyRules:
  allowAny:
    - vue
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.2.2
  vitest: 4.1.9
  vite-plus: ^0.2.2
  # vite: npm:@voidzero-dev/vite-plus-core@^0.1.21
  # vitest: npm:@voidzero-dev/vite-plus-test@^0.1.21
  # vite-plus: ^0.1.21
minimumReleaseAgeExclude:
  - vite-plugin-vue-router-auto-generate-const@0.2.0
