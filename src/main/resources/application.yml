greeting:
  message: "hello"

quarkus:
  native:
    debug:
      enabled: true
    builder-image: graalvm
    container-build: true
  quinoa:
    ui-root-path: "ui"
    package-manager: "pnpm"
    package-manager-command:
      dev: "run dev"
    enable-spa-routing: true
    build-dir: "dist"
    dev-server:
      port: 5173
